<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layoutAdmin}">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>
</head>
<body>

<div layout:fragment="content">
    <div class="card shadow-sm">

        <div class="card-header bg-primary text-white">
            <div class="d-flex justify-content-between align-items-center">
                <h2 class="mb-0">
                    <i class="bi bi-box-seam-fill me-2"></i>
                    Quản lý sản phẩm
                </h2>
                <a th:href="@{/admin/create}" class="btn btn-light">
                    Thêm sản phẩm mới
                </a>
            </div>
        </div>

        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-bordered table-hover align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th style="width: 10%;">Sản phẩm</th>
                        <th>Tên sản phẩm</th>
                        <th style="width: 15%;">Loại</th>
                        <th style="width: 15%;">Giá</th>
                        <th style="width: 10%;">Tình trạng</th>
                        <th style="width: 15%;" class="text-center">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${dsSanPham}">
                        <td>
                            <img th:src="${item.hinhAnh != null} ? @{'/images/' + ${item.hinhAnh}} : @{/images/default.jpg}"
                                 th:alt="${item.tenSp}"
                                 class="img-fluid rounded"
                                 style="width: 80px; height: 80px; object-fit: cover;">
                        </td>

                        <td th:text="${item.tenSp}"></td>

                        <td th:text="${item.danhMuc != null and item.danhMuc.tenDm != null} ? ${item.danhMuc.tenDm} : 'Chưa phân loại'"></td>

                        <td th:text="${item.gia != null} ? (${#numbers.formatDecimal(item.gia, 0, 'COMMA', 0, 'POINT')} + ' ₫') : 'Liên hệ'"></td>

                        <td>
                            <span th:if="${item.tinhTrang == 'Còn hàng'}" class="badge bg-success" th:text="${item.tinhTrang}"></span>
                            <span th:unless="${item.tinhTrang == 'Còn hàng'}" class="badge bg-danger" th:text="${item.tinhTrang}"></span>
                        </td>

                        <td class="text-center">
                            <a th:href="@{/admin/edit/{id}(id=${item.maSp})}" class="btn btn-warning btn-sm me-2">Sửa</a>
                            <a th:href="@{/admin/delete/{id}(id=${item.maSp})}" class="btn btn-danger btn-sm">Xóa</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

</body>
</html>
