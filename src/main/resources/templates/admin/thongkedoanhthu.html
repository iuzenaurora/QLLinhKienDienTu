<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layoutAdmin}">
<head>
    <title>Thống kê doanh thu</title>
</head>

<body>

<div layout:fragment="content">

    <div class="container py-4">

        <!-- TITLE -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>

                <h2 class="fw-bold mb-1">
                    <i class="bi bi-bar-chart-line-fill text-success"></i>
                    Thống kê doanh thu
                </h2>

                <p class="text-muted mb-0">
                    Doanh thu từ các đơn hàng đã giao thành công
                </p>

            </div>

        </div>

        <!-- CARD DOANH THU -->
        <div class="card shadow border-0 rounded-4 mb-4">

            <div class="card-body bg-success text-white rounded-4">

                <div class="row align-items-center">

                    <div class="col-md-8">

                        <h5 class="fw-light">
                            Tổng doanh thu
                        </h5>

                        <h2 class="fw-bold mt-3">

                            <span th:text="${#numbers.formatDecimal(tongDoanhThu,0,'COMMA',0,'POINT')} + ' VNĐ'">
                            </span>

                        </h2>

                        <p class="mb-0 mt-3">
                            Tổng doanh thu từ tất cả đơn hàng
                            có trạng thái
                            <strong>"Đã giao"</strong>
                        </p>

                    </div>

                    <div class="col-md-4 text-end">

                        <i class="bi bi-cash-stack"
                           style="font-size: 90px; opacity: 0.3;">
                        </i>

                    </div>

                </div>

            </div>

        </div>

        <!-- TABLE -->
        <div class="card shadow-sm border-0 rounded-4">

            <div class="card-header bg-dark text-white rounded-top-4">

                <h5 class="mb-0">
                    <i class="bi bi-receipt"></i>
                    Chi tiết đơn hàng đã giao
                </h5>

            </div>

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="table-light">

                        <tr>

                            <th>Mã HĐ</th>

                            <th>Khách hàng</th>

                            <th>Ngày lập</th>

                            <th class="text-end">
                                Tổng tiền
                            </th>

                            <th class="text-center">
                                Trạng thái
                            </th>

                        </tr>

                        </thead>

                        <tbody>

                        <tr th:each="item : ${dsHoaDon}"
                            th:if="${item.trangThai == 'Đã giao'}">

                            <!-- MÃ HD -->
                            <td>

                                <span class="fw-bold text-primary"
                                      th:text="${item.maHD}">
                                </span>

                            </td>

                            <!-- KHÁCH HÀNG -->
                            <td th:text="${item.khachHang.hoTen}">
                            </td>

                            <!-- NGÀY -->
                            <td th:text="${#temporals.format(item.ngayLap, 'dd/MM/yyyy')}">
                            </td>

                            <!-- TIỀN -->
                            <td class="text-end fw-bold text-danger">

                                <span th:text="${#numbers.formatDecimal(item.tongTien,0,'COMMA',0,'POINT')} + ' VNĐ'">
                                </span>

                            </td>

                            <!-- STATUS -->
                            <td class="text-center">

                                <span class="badge bg-success px-3 py-2">

                                    Đã giao

                                </span>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
