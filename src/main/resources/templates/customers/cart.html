<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/layoutCustomer :: layout(~{::title}, ~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>
</head>
<body>
    <section>
        <div class="container mt-4">
            <h2 class="mb-4 text-center">Giỏ hàng của bạn</h2>

            <div th:if="${#lists.isEmpty(items)}" class="text-center py-5">
                <i class="bi bi-cart-x fs-1 text-muted"></i>
                <p class="mt-3">Giỏ hàng của bạn đang trống.</p>
                <a th:href="@{/}" class="btn btn-primary">Tiếp tục mua sắm</a>
            </div>

            <div th:if="${not #lists.isEmpty(items)}">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Sản phẩm</th>
                                        <th>Giá</th>
                                        <th style="width: 150px;">Số lượng</th>
                                        <th>Tổng</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="item : ${items}">
                                        <td>
                                            <div class="d-flex align-items-center">
                                                <img th:src="${item.sanPham.hinhAnh != null ? (#strings.startsWith(item.sanPham.hinhAnh, '/') or #strings.startsWith(item.sanPham.hinhAnh, 'http') ? item.sanPham.hinhAnh : '/images/' + item.sanPham.hinhAnh) : 'https://via.placeholder.com/50'}"
                                                     class="rounded me-3" style="width: 50px; height: 50px; object-fit: contain;">
                                                <span th:text="${item.sanPham.tenSp}" class="fw-bold"></span>
                                            </div>
                                        </td>
                                        <td th:text="${#numbers.formatDecimal(item.sanPham.gia, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                                        <td>
                                            <form th:action="@{/cart/update}" method="post" class="d-flex align-items-center">
                                                <input type="hidden" name="maSp" th:value="${item.sanPham.maSp}">
                                                <input type="number" name="soLuong" th:value="${item.soLuong}" 
                                                       class="form-control form-control-sm me-2" min="1" onchange="this.form.submit()">
                                            </form>
                                        </td>
                                        <td class="text-danger fw-bold" 
                                            th:text="${#numbers.formatDecimal(item.sanPham.gia.multiply(new java.math.BigDecimal(item.soLuong)), 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                                        <td>
                                            <a th:href="@{/cart/remove/{id}(id=${item.sanPham.maSp})}" class="text-danger">
                                                <i class="bi bi-trash"></i> Xóa
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                                <tfoot>
                                    <tr>
                                        <td colspan="3" class="text-end fw-bold">Tổng tiền:</td>
                                        <td colspan="2" class="text-danger fw-bold fs-5" 
                                            th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a th:href="@{/}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Tiếp tục mua sắm
                    </a>
                    <a th:href="@{/cart/checkout}" class="btn btn-danger btn-lg px-5">Đặt hàng ngay</a>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
