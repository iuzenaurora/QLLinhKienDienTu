<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/layoutCustomer :: layout(~{::title}, ~{::section})}">
<head>
    <meta charset="UTF-8">
    <title th:text="${sp.tenSp} + ' - PhuKienRe'">Chi tiết sản phẩm</title>
</head>
<body>
<section class="container main-container my-4">

    <!-- Breadcrumb (Đường dẫn điều hướng) -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none text-danger"><i class="fas fa-home"></i> Trang chủ</a></li>
            <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none text-danger">Sản phẩm</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${sp.tenSp}">Tên SP</li>
        </ol>
    </nav>

    <div class="bg-white p-4 rounded-3 shadow-sm border border-light">
        <div class="row">
            <!-- Hình ảnh sản phẩm -->
            <div class="col-md-5 mb-4 text-center">
                <div class="border rounded p-3 h-100 d-flex align-items-center justify-content-center">
                    <img th:src="${sp.hinhAnh != null ? (#strings.startsWith(sp.hinhAnh, '/') or #strings.startsWith(sp.hinhAnh, 'http') ? sp.hinhAnh : '/images/' + sp.hinhAnh) : 'https://via.placeholder.com/400'}"
                         th:alt="${sp.tenSp}"
                         class="img-fluid"
                         style="max-height: 380px; object-fit: contain;" />
                </div>
            </div>

            <!-- Thông tin chi tiết -->
            <div class="col-md-7 ps-md-4">
                <h3 class="fw-bold mb-3" style="color: #333; line-height: 1.4;" th:text="${sp.tenSp}">Tên Sản Phẩm</h3>

                <!-- Review Demo -->
                <div class="d-flex align-items-center mb-3">
                    <div class="text-warning me-2 fs-6">
                        <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star-half-alt"></i>
                    </div>
                    <span class="text-muted text-decoration-underline" style="cursor: pointer;">(12 đánh giá)</span>
                </div>

                <!-- Box Giá -->
                <div class="p-3 rounded mb-4 border" style="background-color: #fdf2f2; border-color: #fcd5d5 !important;">
                    <h2 class="text-danger fw-bold mb-0" th:text="${#numbers.formatDecimal(sp.gia, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</h2>
                </div>

                <!-- Tình trạng & Bảo hành -->
                <div class="mb-4 p-3 bg-light rounded border">
                    <div class="row mb-2">
                        <div class="col-4 text-muted"><i class="fas fa-check-circle text-success me-2"></i>Tình trạng:</div>
                        <div class="col-8">
                            <span class="badge bg-success" th:if="${sp.soLuong > 0}" th:text="${sp.tinhTrang}">Còn hàng</span>
                            <span class="badge bg-danger" th:if="${sp.soLuong <= 0}">Hết hàng</span>
                            <span class="text-muted ms-2 fw-medium" th:if="${sp.soLuong > 0}">(Sẵn có: <span th:text="${sp.soLuong}"></span>)</span>
                        </div>
                    </div>
                    <div class="row mb-2">
                        <div class="col-4 text-muted"><i class="fas fa-shield-alt text-primary me-2"></i>Bảo hành:</div>
                        <div class="col-8 fw-medium">12 Tháng chính hãng</div>
                    </div>
                    <div class="row">
                        <div class="col-4 text-muted"><i class="fas fa-box text-secondary me-2"></i>Đổi trả:</div>
                        <div class="col-8 fw-medium">1 Đổi 1 trong 30 ngày</div>
                    </div>
                </div>

                <div class="d-flex gap-3 mt-4">
                    <a th:href="@{/cart/buy-now/{id}(id=${sp.maSp})}" class="btn btn-danger btn-lg flex-grow-1 fw-bold d-flex flex-column justify-content-center">
                        MUA NGAY <br> <span class="fs-6 fw-normal" style="font-size: 0.85rem !important;">Giao tận nơi hoặc nhận tại cửa hàng</span>
                    </a>
                    <a th:href="@{/cart/add/{id}(id=${sp.maSp})}" class="btn btn-outline-danger btn-lg flex-grow-1 fw-bold d-flex flex-column justify-content-center align-items-center">
                        <i class="fas fa-cart-plus mb-1 fs-5"></i>
                        <span style="font-size: 0.95rem;">THÊM VÀO GIỎ</span>
                    </a>
                </div>
            </div>
        </div>

        <hr class="my-5 border-light">

        <!-- Phần Mô tả chi tiết -->
        <div class="row">
            <div class="col-12">
                <h5 class="fw-bold mb-3 text-danger"><i class="fas fa-info-circle me-2"></i>Thông tin sản phẩm</h5>
                <div class="p-4 bg-light rounded text-secondary" style="line-height: 1.8;">
                    <p th:text="${sp.moTa}">Chưa có mô tả chi tiết cho sản phẩm này.</p>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
